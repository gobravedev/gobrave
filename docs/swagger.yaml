info:
  contact:
    name: AiAgentGo Github
    url: https://github.com/minebiome/ai-agent-go
  description: AiAgentGo 是一个基于 Go 语言构建的 AI Agent 框架，旨在提供高性能、可扩展的解决方案，帮助开发者快速构建智能代理应用。
  termsOfService: http://swagger.io/terms/
  title: AiAgentGo API
  version: "1.0"
paths:
  /analysis/edit-node-params/{analysisNodeId}:
    post:
      description: 依次查询 AnalysisNode、Analysis、Workflow(dag_definition)、Module(io_schema)
        后组装 formJson
      parameters:
      - description: 分析节点 ID
        in: path
        name: analysisNodeId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.EditNodeParamsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_gobravedev_gobrave_internal_errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_gobravedev_gobrave_internal_errors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_gobravedev_gobrave_internal_errors.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_gobravedev_gobrave_internal_errors.AppError'
      security:
      - Bearer: []
      summary: 编辑分析节点参数
      tags:
      - 分析
  /analysis/edit-params-v2/{analysisId}:
    post:
      description: 查询 analysis 基础信息，并按 workflowId 复用工作流表单逻辑返回 formJson 与 analysis_result
      parameters:
      - description: 分析 ID
        in: path
        name: analysisId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.EditParamsV2Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_gobravedev_gobrave_internal_errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_gobravedev_gobrave_internal_errors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_gobravedev_gobrave_internal_errors.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_gobravedev_gobrave_internal_errors.AppError'
      security:
      - Bearer: []
      summary: 编辑分析参数（V2）
      tags:
      - 分析
  /analysis/visualization-node-file/{analysisNodeId}:
    get:
      description: 查询 AnalysisNode 并补充容器模板与镜像信息，同时返回 output_dir 下可视化资源列表
      parameters:
      - description: 分析节点 ID
        in: path
        name: analysisNodeId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.VisualizationNodeFileResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_gobravedev_gobrave_internal_errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_gobravedev_gobrave_internal_errors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_gobravedev_gobrave_internal_errors.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_gobravedev_gobrave_internal_errors.AppError'
      security:
      - Bearer: []
      summary: 分析节点结果文件可视化
      tags:
      - 分析
  /auth/change-password:
    post:
      consumes:
      - application/json
      description: 修改当前用户的登录密码
      parameters:
      - description: 密码修改请求
        in: body
        name: request
        required: true
        schema:
          properties:
            new_password:
              type: string
            old_password:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: 修改成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/github_com_gobravedev_gobrave_internal_errors.AppError'
      security:
      - Bearer: []
      summary: 修改密码
