proxy:
  brave_api: http://localhost:5000
  container: http://localhost:8089
  onlyoffice: http://localhost:8080

route:
  # gateway | traefik
  registry: gateway
  # analysis app reverse proxy prefix
  apps_prefix: /c/analysis/apps
  # gateway registry mapping persistence uses database table `go_gateway_route`
  traefik:
    # api | file
    provider: api
    # when provider=api, set your provider API base url
    base_url: http://localhost:8080
    upsert_path: /api/providers/http/routes/{route_key}
    delete_path: /api/providers/http/routes/{route_key}
    auth_token: ""
    timeout_second: 5
    # when provider=file, write dynamic config to this path
    # file_path: ./traefik/dynamic/routes.yaml

storage:
  # 图片上传存储目录。支持绝对路径；相对路径按当前工作目录解析。
  # 留空时默认使用“可执行文件所在目录/images”。
  image_dir: ""

container:
  # 服务启动时是否异步刷新 ContainerImage 状态。
  # true: 启动 goroutine 刷新镜像状态；false: 跳过启动刷新。
  refresh_image_status_on_start: true

tenant:
  # default_tenant_id: "default"
  # default_tenant_name: "Default Tenant"
  # default_tenant_description: "This is the default tenant."
  # api_key_prefix: "sk-"
  # 16、24 或 32
  aes_key: "xxxxxxxxxxxxx"